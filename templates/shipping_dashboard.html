<html lang="en">
  <head>
    <title>Shipping Administration</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='fonts/font-awesome-4.7.0/css/font-awesome.min.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/util.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/main.css') }}"
    />

    <style>
      /* Global Link Styling */
      a {
        text-decoration: none !important;
      }

      /* Sticky Desktop Header */
      @media (min-width: 992px) {
        .container-menu-desktop,
        .wrap-menu-desktop {
          position: fixed !important;
          top: 0;
          left: 0;
          width: 100%;
          background-color: white !important;
          z-index: 9999 !important;
        }
        .wrap-menu-desktop {
          box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
      }

      h1 {
        padding-top: 50px;
      }
      body {
        font-family: Arial;
        min-height: 100vh;
        padding: 0;
        background-color: white;
        margin-top: 0;
      }
      body *:lang(ar),
      body *[dir="rtl"] {
        font-family: "Cairo", Arial, sans-serif !important;
        direction: rtl;
      }

      .dashboard-container {
        max-width: 900px;
        margin: 120px auto;
        padding: 0 15px;
      }

      .shipping-card {
        background: white;
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        margin-bottom: 30px;
        position: relative;
        overflow: hidden;
      }

      .shipping-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 6px;
        background: linear-gradient(135deg, #717fe0, #5666da);
      }

      .title {
        font-family: "Cairo", sans-serif;
        font-weight: 700;
        color: #333;
        margin-bottom: 25px;
        font-size: 1.5rem;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      /* FORM GRID */
      .add-form {
        display: grid;
        grid-template-columns: 2fr 1fr min-content;
        gap: 15px;
        align-items: end;
      }

      .input-wrapper label {
        display: block;
        margin-bottom: 8px;
        color: #666;
        font-weight: 500;
        font-size: 0.95rem;
      }

      .input-wrapper input {
        width: 100%;
        padding: 12px 16px;
        border-radius: 8px;
        border: 1.5px solid #d6dae6;
        background: #f9faff;
        outline: none;
        transition: 0.3s;
        font-size: 1rem;
      }

      .input-wrapper input:focus {
        border-color: #717fe0;
        background: white;
        box-shadow: 0 0 0 3px rgba(113, 127, 224, 0.15);
      }

      .add-btn {
        background: linear-gradient(135deg, #717fe0, #5666da);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
        height: 50px;
        white-space: nowrap;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .add-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(113, 127, 224, 0.3);
      }

      /* TABLE STYLES */
      .table-wrapper {
        width: 100%;
        overflow-x: auto;
      }

      .shipping-table {
        width: 100%;
        border-collapse: collapse;
      }

      .shipping-table th {
        background: #f8f9fa;
        color: #7a7f92;
        font-weight: 600;
        padding: 15px;
        text-align: left;
        border-bottom: 2px solid #e9ecef;
      }

      .shipping-table td {
        padding: 15px;
        border-bottom: 1px solid #f1f3f5;
        color: #333;
        font-weight: 500;
      }

      body *[dir="rtl"] .shipping-table th,
      body *[dir="rtl"] .shipping-table td {
        text-align: right;
      }

      .shipping-table tr:hover {
        background: #fbfcff;
      }

      .delete-btn {
        background: #fff0f0;
        color: #ea5455;
        border: none;
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-weight: 600;
        font-size: 0.9rem;
      }

      .delete-btn:hover {
        background: #ea5455;
        color: white;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #666;
        text-decoration: none;
        font-weight: 600;
        margin-bottom: 20px;
        transition: 0.2s;
      }

      .back-link:hover {
        color: #717fe0;
      }

      @media (max-width: 600px) {
        .add-form {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    {% include 'header.html' %}

    <div class="dashboard-container">
      <a href="/dashboard" class="back-link">
        <i class="fa fa-arrow-left"></i> Back to Dashboard
      </a>

      <!-- ADD NEW CITY CARD -->
      <div class="shipping-card">
        <h2 class="title">
          <i class="fa fa-map-marker" style="color: #717fe0"></i> Add New City
        </h2>
        <form action="/admin/shipping/add" method="POST" class="add-form">
          <div class="input-wrapper">
            <label for="city" style="font-family: &quot;Cairo&quot;, sans-serif"
              >City Name / اسم المدينة</label
            >
            <input
              type="text"
              id="city"
              name="city"
              placeholder="e.g. القاهرة"
              required
              autocomplete="off"
              dir="auto"
              style="font-family: &quot;Cairo&quot;, sans-serif"
            />
          </div>
          <div class="input-wrapper">
            <label for="price">Shipping Cost (E£)</label>
            <input
              type="number"
              id="price"
              name="price"
              placeholder="e.g. 50"
              required
              min="0"
            />
          </div>
          <button type="submit" class="add-btn">
            <i class="fa fa-plus"></i> Add
          </button>
        </form>
      </div>

      <!-- EXISTING CITIES LIST -->
      <div class="shipping-card">
        <h2 class="title">
          <i class="fa fa-list" style="color: #717fe0"></i> Current Shipping
          Prices
        </h2>
        <div class="table-wrapper">
          <table class="shipping-table">
            <thead>
              <tr>
                <th>City</th>
                <th>Price (E£)</th>
                <th style="width: 100px">Actions</th>
              </tr>
            </thead>
            <tbody>
              {% for item in prices %}
              <tr>
                <td
                  style="
                    font-size: 1.1rem;
                    font-family: &quot;Cairo&quot;, sans-serif;
                  "
                  dir="auto"
                >
                  {{ item.city }}
                </td>
                <td style="font-weight: 700; color: #717fe0">
                  {{ item.price }} E£
                </td>
                <td>
                  <form
                    action="/admin/shipping/delete/{{ item.id }}"
                    method="POST"
                    style="margin: 0; display: inline"
                  >
                    <button
                      type="submit"
                      class="delete-btn"
                      onclick="
                        return confirm(
                          'Are you sure you want to delete this city?',
                        );
                      "
                    >
                      <i class="fa fa-trash"></i> Delete
                    </button>
                  </form>
                </td>
              </tr>
              {% else %}
              <tr>
                <td
                  colspan="3"
                  style="text-align: center; padding: 30px; color: #999"
                >
                  No shipping areas found. Add a new city above.
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>

    {% include 'footer.html' %}

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
