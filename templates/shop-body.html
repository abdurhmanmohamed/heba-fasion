		<div class="container">
			<div class="flex-w flex-sb-m p-b-52">
				<div class="flex-w flex-l-m filter-tope-group m-tb-10 ">
					<button class="stext-106 cl6 hov1 bor3 trans-04 m-r-32 m-tb-5 how-active1" data-filter="*">
						All Products
					</button>
					<button class="stext-106 cl6 hov1 bor3 trans-04 m-r-32 m-tb-5" data-filter=".women">
						Women
					</button>
					<button class="stext-106 cl6 hov1 bor3 trans-04 m-r-32 m-tb-5" data-filter=".men">
						Men
					</button>
					<button class="stext-106 cl6 hov1 bor3 trans-04 m-r-32 m-tb-5" data-filter=".bag">
						Bag
					</button>
					<button class="stext-106 cl6 hov1 bor3 trans-04 m-r-32 m-tb-5" data-filter=".shoes">
						Shoes
					</button>
					<button class="stext-106 cl6 hov1 bor3 trans-04 m-r-32 m-tb-5" data-filter=".watches">
						Watches
					</button>
				</div>

				<div class="flex-w flex-c-m m-tb-10">

					<div class="flex-c-m stext-106 cl6 size-105 bor4 pointer hov-btn3 trans-04 m-tb-4 js-show-search">
						<i class="icon-search cl2 m-r-6 fs-15 trans-04 zmdi zmdi-search"></i>
						<i class="icon-close-search cl2 m-r-6 fs-15 trans-04 zmdi zmdi-close dis-none"></i>
						Search

				</div>
				
				<!-- Search product -->
				<div class="dis-none panel-search w-full p-t-10 p-b-15">
					<div class="bor8 dis-flex p-l-15">
						<button class="size-113 flex-c-m fs-16 cl2 hov-cl1 trans-04">

						<input class="mtext-107 cl2 size-114 plh2 p-r-15" type="text" name="search-product" placeholder="Search">

            <div class="row isotope-grid">

							<div class="block2-pic hov-img0 rounded-2">

								<a href="#" class="block2-btn flex-c-m stext-103 cl2 size-102 bg0 bor2 hov-btn1 p-lr-15 trans-04 js-show-modal1 " data-id="{{ item.id }}">
									Quick View
								</a>
							</div>

							<div class="block2-txt flex-w flex-t p-t-14">
								<div class="block2-txt-child1 flex-col-l ">
									<a href="" class="stext-104 cl4 hov-cl1 trans-04 js-name-b2 p-b-6 trans-04 js-show-modal1" style="color: rgb(51, 50, 50); font-size: 1.5rem;">
										{{item.name}}
									</a>

									<span class="stext-105 cl3" style="color: rgb(58, 55, 55); font-size: 1.1rem;">
										{{item.price}} E£
									</span>
								</div>

								<div class="block2-txt-child2 flex-r p-t-3">
									<a href="#" class="btn-addwish-b2 dis-block pos-relative js-addwish-b2">
										<img class="icon-heart1 dis-block trans-04" src="/static/images/icons/icon-heart-01.png" alt="ICON">
										<img class="icon-heart2 dis-block trans-04 ab-t-l" src="/static/images/icons/icon-heart-02.png" alt="ICON">
									</a>

							</div>
						</div>
					</div>
				{% endfor %}

				{% if current_user.is_authenticated : %}

					<div class="col-sm-6 col-md-4 col-lg-3 p-b-35 isotope-item women">
						<!-- Block2 -->
						<a href="{{url_for('login')}}"><div 
							style="
								width: 150px; 
								height: 150px; 
								background-color: #ffffff; 
								border-radius: 12px; 
								display: flex; 
								justify-content: center; 
								align-items: center; 
								box-shadow: 0 6px 15px rgba(0, 0, 0, 0.781); 
								font-size: 72px; 
								color: #717fe0; 
								cursor: pointer; 
								transition: all 0.3s ease;
							"
							onmouseover="this.style.backgroundColor='#717fe0'; this.style.color='#ffffff'; this.style.boxShadow='0 6px 20px rgba(0,0,0,0.3)'; this.style.transform='translateY(-5px)';"
							onmouseout="this.style.backgroundColor='#ffffff'; this.style.color='#717fe0'; this.style.boxShadow='0 4px 12px rgba(0,0,0,0.15)'; this.style.transform='translateY(0)';"
							>
							+
						</div></a>
					</div>

			</div>
	</div>
    <!-- back to up button -->
	<div class="btn-back-to-top" id="myBtn">
		<span class="symbol-btn-back-to-top">
			<i class="zmdi zmdi-chevron-up"></i>
		</span>
	</div>

	<!-- show model -->
	<div class="wrap-modal1 js-modal1 p-t-60 p-b-20 " >
		<div class="overlay-modal1 js-hide-modal1"></div>

		<div class="container rounded-2">
			<div class="bg0 p-t-60 p-b-30 p-lr-15-lg how-pos3-parent rounded-3">
				<button class="how-pos3 hov3 trans-04 js-hide-modal1">
					<img src="/static/images/icons/icon-close.png" alt="CLOSE" >
				</button>

				<div class="row">
					<div class="col-md-6 col-lg-7 p-b-30">
						<div class="p-l-25 p-r-30 p-lr-0-lg">
							<div class="wrap-slick3 flex-sb flex-w">
								<div class="wrap-slick3-dots"></div>
								<div class="wrap-slick3-arrows flex-sb-m flex-w"></div>

								<div class="slick3 gallery-lb" id = 'all_item_imgs'>
									
								</div>
							</div>
						</div>
					</div>
					
					<div class="col-md-6 col-lg-5 p-b-30">
						<div class="p-r-50 p-t-5 p-lr-0-lg">
							<h4 class="mtext-105 cl2 js-name-detail p-b-14" id="name">
								
							</h4>

							<span class="stext-200 cl2" id="price" style="font-size: 1.2rem;">
								
							</span>

							<p class="stext-102 cl3 p-t-23" id="description">
								
							</p>
							
							<!--  -->
							<div class="p-t-33">
								<div class="flex-w flex-r-m p-b-10">
									<div class="size-203 flex-c-m respon6">
										Size
									</div>

									<div class="size-204 respon6-next">
										<div class="rs1-select2 bor8 bg0">
											<select class="js-select2" name="time" id="size">
												<option>Choose an option</option>
												<option>Size S</option>
												<option>Size M</option>
												<option>Size L</option>
												<option>Size XL</option>
											</select>
											<div class="dropDownSelect2"></div>
										</div>
									</div>
								</div>

								<div class="flex-w flex-r-m p-b-10">
									<div class="size-203 flex-c-m respon6">
										Color
									</div>

									<div class="size-204 respon6-next">
										<div class="rs1-select2 bor8 bg0">
											<select class="js-select2" name="time" id = 'color'>
											</select>
											<div class="dropDownSelect2"></div>
										</div>
									</div>
								</div>
								
								<div class="flex-w flex-r-m p-b-10">
									<div class="size-204 flex-w flex-m respon6-next">
										<div class="wrap-num-product flex-w m-r-20 m-tb-10">
											<div class="input-group quantity-box" style="width:140px;">
												
												<button class="btn btn-outline-dark minus-btn" type="button">−</button>

												<input 
													type="text" 
													class="form-control text-center quantity-input" 
													value="1"
													id="amount"
												>

												<button class="btn btn-outline-dark plus-btn" type="button">+</button>

											</div>
										</div>

										<button class="flex-c-m stext-101 cl0 size-101 bg1 bor1 hov-btn1 p-lr-15 trans-04 js-addcart-detail" id="add-cart">
											Add to cart
										</button>
									</div>
								</div>	
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<!-- seding the collected data to the servers -->
	<script>
		document.getElementById('add-cart').addEventListener('click', function() {
			let popup = document.getElementById('popup');
			let itemId = popup.dataset.id; // get item id from popup
			let amount = document.getElementById('amount');
			let color = document.getElementById('color').value;
			let size = document.getElementById('size').value;

			let dataToSend = {
				id: itemId,
				amount: amount.value,
				color: color,
				size: size
			};

			// send to Flask
			fetch('/add-to-cart', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify(dataToSend)
			})
			.then(res => res.json())
			.then(data => console.log(data))
			.catch(err => console.error(err));
			document.getElementById("amount").value = 1;

		});

	</script>
	<script>

		document.querySelector('.minus-btn').onclick = function(){

			let input = document.querySelector('.quantity-input');
			let value = parseInt(input.value);

			if(value > 1){
				input.value = value - 1;
			}

		};

		document.querySelector('.plus-btn').onclick = function(){

			let input = document.querySelector('.quantity-input');
			let value = parseInt(input.value);

			input.value = value + 1;

		};

	</script>
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
