	<!--===============================================================================================-->
	<style>
		body{
			font-family:Arial;
			background:#f4f6fb;
			padding:0;
		}

		.dashboard{
			margin-top:120px;
			max-width:900px;
			margin-left:15px;
			margin-right:15px;
			margin-bottom: 100px;
		}


		.top-buttons{
			display:flex;
			gap:10px;
			
			margin: auto;
			margin-bottom:20px;
			
		}

		.tab-btn{
			flex:1;
			padding:14px;
			border:none;
			border-radius:8px;
			cursor:pointer;
			background:#e0e3ec;
			transition:0.3s;
		}

		.tab-btn.active{
			background:#4f46e5;
			color:white;
		}

		.content-area{
			position:relative;
		}

		.content{
			background:white;
			padding:20px;
			border-radius:10px;
			box-shadow:0 5px 20px rgba(0,0,0,0.1);

			height:400px;
			overflow-y:auto;

			opacity:0;
			transform:translateY(20px);
			transition:0.3s;

			position:absolute;
			width:100%;
		}

		.content.active{
			opacity:1;
			transform:translateY(0);
			position:relative;
		}

		.order-card{
			display:flex;
			justify-content:space-between;
			align-items:center;

			padding:15px;
			margin-bottom:15px;

			border-radius:10px;
			background:#f9f9ff;
			border:1px solid #eee;

			transition:0.25s;
		}

		.order-card:hover{
			transform:scale(1.02);
		}

		.order-info h3{
			margin:0;
		}

		.order-info p{
			margin:4px 0 0;
			color:#666;
		}

		.order-side{
			text-align:right;
		}

		.price{
			display:block;
			font-weight:bold;
			margin-bottom:8px;
		}

		.btn{
			border:none;
			padding:6px 12px;
			border-radius:6px;
			cursor:pointer;
		}

		.package{
			background:#f59e0b;
			color:white;
		}

		.done{
			background:#22c55e;
			color:white;
		}
		.content::-webkit-scrollbar{
			width:8px;
			height: 5px;
		}

		.content::-webkit-scrollbar-thumb{
			background:#4f46e5;
			border-radius:20px;
		}
		.welcome{
			text-align: center;
			margin: 0 auto;
			position: relative;
			top: 50px;
			
		}
	</style>
</head>

<body>
	{% include 'header.html' %}
	{%if current_user.is_authenticated%}
		<div class="welcome">
			<h1>Welcome back, {{current_user.name.capitalize()}}</h1>
		</div>
	{%endif%}
	<div class="dashboard">

		<div class="top-buttons">
			<button class="tab-btn active" data-target="orders">Orders</button>
			<button class="tab-btn" data-target="packaged">Packaged</button>
			<button class="tab-btn" data-target="done">Done</button>
		</div>

		<div class="content-area">

			<!-- Orders -->
			<div class="content active" id="orders">

				<div class="order-card">
					<div class="order-info">
						<h3>Ahmed Mohamed</h3>
						<p>2x Burger - 1x Cola</p>
					</div>

					<div class="order-side">
						<span class="price">$18</span>
						<button class="btn package">Package</button>
					</div>
				</div>

				<div class="order-card">
					<div class="order-info">
						<h3>Omar Ali</h3>
						<p>Pizza Large</p>
					</div>

					<div class="order-side">
						<span class="price">$12</span>
						<button class="btn package">Package</button>
					</div>
				</div>

			</div>


			<!-- Packaged -->
			<div class="content" id="packaged">

				<div class="order-card">
					<div class="order-info">
						<h3>Mahmoud</h3>
						<p>Chicken Sandwich</p>
					</div>

					<div class="order-side">
						<span class="price">$9</span>
						<button class="btn done">Done</button>
					</div>
				</div>

			</div>


			<!-- Done -->
			<div class="content" id="done">
				<p>All completed orders will appear here.</p>
			</div>

		</div>

	</div>
	{% include "footer.html" %}

	<script>
		const buttons = document.querySelectorAll(".tab-btn")
		const contents = document.querySelectorAll(".content")

		const ordersContainer = document.getElementById("orders")
		const packagedContainer = document.getElementById("packaged")
		const doneContainer = document.getElementById("done")

		// switch tabs
		buttons.forEach(button=>{
		button.addEventListener("click",()=>{

		buttons.forEach(btn=>btn.classList.remove("active"))
		button.classList.add("active")

		contents.forEach(content=>content.classList.remove("active"))

		document.getElementById(button.dataset.target).classList.add("active")

		})
		})


		// create order card
		function createOrder(name, items, price){

		const card = document.createElement("div")
		card.className="order-card"

		card.innerHTML = `
		<div class="order-info">
		<a role="button">
		<h3>${name}</h3>
		<p>${items}</p>
		</a>
		</div>

		<div class="order-side">
		<span class="price">$${price}</span>
		<button class="btn package">Package</button>
		</div>
		`

		// move to packaged
		card.querySelector(".package").onclick = ()=>{

		card.querySelector(".package").remove()

		const doneBtn = document.createElement("button")
		doneBtn.className="btn done"
		doneBtn.textContent="Done"

		doneBtn.onclick=()=>{
		doneBtn.remove()
		doneContainer.appendChild(card)
		}

		card.querySelector(".order-side").appendChild(doneBtn)

		packagedContainer.appendChild(card)

		}

		return card
		}


		// sample orders
		ordersContainer.appendChild(createOrder("Ahmed Mohamed","2x Burger - Cola",18))
		ordersContainer.appendChild(createOrder("Omar Ali","Pizza Large",12))
		ordersContainer.appendChild(createOrder("Mahmoud Hassan","Chicken Sandwich",9))
	</script>
