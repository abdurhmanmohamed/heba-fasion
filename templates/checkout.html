    />

	<style>

		/* darker background behind form */
		body{
			text-align: center;
		}
		.contact-bg{
			background:#f2f4f8;
			padding:20px 0;
		}

		/* form card */

		.contact-card{
			background:white;
			padding:50px;
			border-radius:14px;
			box-shadow:0 20px 60px rgba(0,0,0,0.15);
			max-width:600px;
			margin:10px auto;
		}

		/* floating input */

		.input-group{
			position:relative;
			margin-bottom:28px;
		}

		.input-group input,
		.input-group textarea,
		.input-group select{
			width:100%;
			padding:16px;
			border:2px solid #ddd;
			border-radius:8px;
			font-size:15px;
			background:none;
			outline:none;
			transition:.3s;
		}

		/* label */

		.input-group label{
			position:absolute;
			left:14px;
			top:50%;
			transform:translateY(-50%);
			background:white;
			padding:0 6px;
			color:#888;
			font-size:14px;
			pointer-events:none;
			transition:.3s;
		}

		/* animation */

		.input-group input:focus,
		.input-group textarea:focus,
		.input-group select:focus{
			border-color:#717fe0;
		}

		.input-group input:focus + label,
		.input-group input:not(:placeholder-shown) + label,
		.input-group textarea:focus + label,
		.input-group textarea:not(:placeholder-shown) + label{
			top:-8px;
			font-size:12px;
			color:#717fe0;
		}

		/* button */

		.submit-btn{
			width:100%;
			padding:14px;
			border:none;
			border-radius:8px;
			background:#222;
			color:white;
			font-size:16px;
			font-weight:600;
			transition:.3s;
		}

		.submit-btn:hover{
			background:#717fe0;
			transform:translateY(-2px);
		}

	</style>
  </head>

  <body class="animsition">
    {% include "header.html" %}
	<section class="bg-img1 txt-center p-lr-15 p-tb-10	contact-bg">
		<h2 class="ltext-201 cl2 p-t-25 p-b-20 respon1" style="color: black;">
			Checkout  Form
		</h2>
	</section>	
    <section class="bg0 p-t-20 p-b-20 contact-bg">
      <div class="container">
        <div class="flex-w flex-tr">
          <div
            class="size-auto bor10 p-lr-70 p-t-55 p-b-70 p-lr-15-lg w-full-md"
          >
           	<div class="contact-card">

				<form>

					<div class="input-group">
						<input type="text" name="fullname" placeholder=" " required>
						<label>Full Name</label>
					</div>

					<div class="input-group">
						<input type="tel" name="phone" placeholder=" " required>
						<label>Phone Number</label>
					</div>

					<div class="input-group">
						<input type="text" name="city" placeholder=" ">
						<label>City</label>
					</div>

					<div class="input-group">
						<input type="text" name="location" placeholder=" ">
						<label>Location</label>
					</div>

					<div class="input-group">
						<select name="field">
							<option value=""></option>
							<option>Customer</option>
							<option>Supplier</option>
							<option>Business Partner</option>
							<option>Other</option>
						</select>
						<label>Field</label>
					</div>

					<div class="input-group">
						<textarea name="msg" rows="4" placeholder=" "></textarea>
						<label>Message</label>
					</div>

					<button type="submit" class="submit-btn	stext-101">
						Submit
					</button>

				</form>
			</div>

          </div>
        </div>
      </div>
    </section>

    {% include 'footer.html' %}

    <div class="btn-back-to-top" id="myBtn">
      <span class="symbol-btn-back-to-top">
        <i class="zmdi zmdi-chevron-up"></i>
      </span>
    </div>

    <script src="{{ url_for('static', filename='vendor/jquery/jquery-3.2.1.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/animsition/js/animsition.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/bootstrap/js/popper.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/bootstrap/js/bootstrap.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/select2/select2.min.js') }}"></script>

    <script>
      $(".js-select2").each(function () {
        $(this).select2({
          minimumResultsForSearch: 20,
          dropdownParent: $(this).next(".dropDownSelect2"),
        });
      });
    </script>

    <script src="{{ url_for('static', filename='vendor/MagnificPopup/jquery.magnific-popup.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/perfect-scrollbar/perfect-scrollbar.min.js') }}"></script>

    <script>
      $(".js-pscroll").each(function () {
        $(this).css("position", "relative");
        $(this).css("overflow", "hidden");

        var ps = new PerfectScrollbar(this, {
          wheelSpeed: 1,
          scrollingThreshold: 1000,
          wheelPropagation: false,
        });

        $(window).on("resize", function () {
          ps.update();
        });
      });
    </script>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
