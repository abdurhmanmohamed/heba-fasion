	<style>

/* PAGE BACKGROUND */

		body{
			background: linear-gradient(135deg,#eef1f7,#dfe5f3);
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
		}


		/* CENTER SECTION */

		.contact-bg{
			min-height:80vh;
			display:flex;
			justify-content:center;
			align-items:center;
			padding:40px 15px;
		}


		/* CARD */

		.contact-card{
			background:white;
			border-radius:18px;
			padding:45px 40px;
			width:100%;
			max-width:700px;

			box-shadow:
				0 30px 60px rgba(0,0,0,0.15);

			transition:.3s;
		}

		.contact-card:hover{
			transform:translateY(-3px);
		}


		/* FORM GRID */

		.contact-card form{
			display:grid;
			grid-template-columns:1fr 1fr;
			gap:22px;
		}


		/* FULL WIDTH ELEMENTS */

		.contact-card textarea,
		.contact-card button,
		.contact-card select{
			grid-column:span 2;
		}


		/* INPUT GROUP */

		.input-group{
			position:relative;
		}


		/* INPUTS */

		.input-group input,
		.input-group textarea,
		.input-group select{
			width:100%;
			padding:14px 14px;
			border-radius:8px;
			border:1.8px solid #d6dae6;
			font-size:15px;

			background:#f9faff;
			outline:none;

			transition:all .25s ease;
		}


		/* INPUT FOCUS */

		.input-group input:focus,
		.input-group textarea:focus,
		.input-group select:focus{
			border-color:#717fe0;
			background:white;

			box-shadow:0 0 0 3px rgba(113,127,224,0.15);
		}


		/* FLOATING LABEL */

		.input-group label{
			position:absolute;
			left:12px;
			top:50%;
			transform:translateY(-50%);
			background:white;
			padding:0 6px;
			color:#7a7f92;
			font-size:14px;
			pointer-events:none;

			transition:.2s;
		}


		/* LABEL ANIMATION */

		.input-group input:focus + label,
		.input-group input:not(:placeholder-shown) + label,
		.input-group textarea:focus + label,
		.input-group textarea:not(:placeholder-shown) + label{
			top:-7px;
			font-size:12px;
			color:#717fe0;
		}


		/* TEXTAREA */

		textarea{
			resize:none;
		}


		/* BUTTON */

		.submit-btn{
			padding:14px;
			border:none;
			border-radius:8px;

			background:linear-gradient(135deg,#222,#444);
			color:white;

			font-size:16px;
			font-weight:600;
			letter-spacing:.3px;

			cursor:pointer;
			transition:.25s;
		}


		/* BUTTON HOVER */

		.submit-btn:hover{
			background:linear-gradient(135deg,#717fe0,#5666da);
			transform:translateY(-2px);

			box-shadow:0 10px 25px rgba(113,127,224,0.35);
		}


		/* MOBILE */

		@media(max-width:700px){

			.contact-card form{
				grid-template-columns:1fr;
			}

			.contact-card textarea,
			.contact-card button,
			.contact-card select{
				grid-column:span 1;
			}

		}

	</style>
  </head>

  <body class="animsition">
    {% include "header.html" %}
	<section class="bg-img1 txt-center p-lr-0 p-tb-0	contact-bg">
		<h2 class="ltext-201 cl2 p-t-0 p-b-0 respon1" style="color: black;">
			Checkout  Form
		</h2>
	</section>	
    <section class="bg0 p-t-20 p-b-20 contact-bg">
      <div class="container">
        <div class="flex-w flex-tr">
          <div
            class="size-auto bor10 p-lr-70 p-t-55 p-b-70 p-lr-15-lg w-full-md"
          >
           	<div class="contact-card">

				<form class="checkout-form" action="{{url_for('check_out')}}", method="POST">

					<div class="input-group">
						<input type="text" name="fullname" placeholder=" " required min="2">
						<label>Full Name</label>
					</div>

					<div class="input-group">
						<input type="tel" name="phone" placeholder=" " required pattern="[0-9]{11}" oninvalid="this.setCustomValidity('Please enter Valid Number')" 
								oninput="this.setCustomValidity('')">
						<label>Phone Number</label>
					</div>
					<div class="input-group">
						<input type="tel" name="second-phone" placeholder=" ">
						<label>Another Phone Number (optional)</label>
					</div>

					<div class="input-group">
						<input type="text" name="city" placeholder=" " required>
						<label>City</label>
					</div>

					<div class="input-group">
						<input type="text" name="adress" placeholder=" " required>
						<label>Adress</label>
					</div>

					<!-- <div class="input-group">
						<select name="field" >
							<option value=""></option>
							<option>Customer</option>
							<option>Supplier</option>
							<option>Business Partner</option>
							<option>Other</option>
						</select>
						<label>Field</label>
					</div> -->

					<div class="input-group">
						<textarea name="msg" rows="4" placeholder=" "></textarea>
						<label>Message</label>
					</div>

					<button type="submit" class="submit-btn	stext-101">
						Submit
					</button>

				</form>
			</div>

          </div>
        </div>
      </div>
    </section>

    {% include 'footer.html' %}

    <div class="btn-back-to-top" id="myBtn">
      <span class="symbol-btn-back-to-top">
        <i class="zmdi zmdi-chevron-up"></i>
      </span>
    </div>

    <script src="{{ url_for('static', filename='vendor/jquery/jquery-3.2.1.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/animsition/js/animsition.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/bootstrap/js/popper.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/bootstrap/js/bootstrap.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/select2/select2.min.js') }}"></script>

    <script>
      $(".js-select2").each(function () {
        $(this).select2({
          minimumResultsForSearch: 20,
          dropdownParent: $(this).next(".dropDownSelect2"),
        });
      });
    </script>

    <script src="{{ url_for('static', filename='vendor/MagnificPopup/jquery.magnific-popup.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/perfect-scrollbar/perfect-scrollbar.min.js') }}"></script>

    <script>
      $(".js-pscroll").each(function () {
        $(this).css("position", "relative");
        $(this).css("overflow", "hidden");

        var ps = new PerfectScrollbar(this, {
          wheelSpeed: 1,
          scrollingThreshold: 1000,
          wheelPropagation: false,
        });

        $(window).on("resize", function () {
          ps.update();
        });
      });
    </script>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
