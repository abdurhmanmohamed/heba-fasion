<!doctype html>
<html lang="en">
  <head>

        n.loaded = !0;
        n.version = "2.0";
        n.queue = [];
        t = b.createElement(e);

        s.parentNode.insertBefore(t, s);
      })(

        document,

        "https://connect.facebook.net/en_US/fbevents.js",
      );
      fbq("init", "2050250489170556");

    <noscript
      ><img
        height="1"
        width="1"
        style="display: none"
        src="https://www.facebook.com/tr?id=2050250489170556&ev=PageView&noscript=1"
    /></noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      /* Reset & fonts */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }
      body {
        background: #f2f4f8;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }
      body *:lang(ar),
      body *:lang(arb),
      body *[dir="rtl"] {
        font-family: "Cairo", Arial, sans-serif !important;
        direction: rtl;
      }
      /* Card */
      .card {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        width: 100%;
        max-width: 400px;
        text-align: center;
      }

      h1 {
        font-size: 1.8rem;
        margin-bottom: 8px;
        color: #111;
      }

      p {
        font-size: 0.9rem;
        color: #666;
        margin-bottom: 20px;
      }

      /* Form */
      form {
        display: grid;
        gap: 18px;
      }

      .input-group {
        position: relative;
      }

      .input-group input {
        width: 100%;
        padding: 14px 12px;
        border: 2px solid #ddd;
        border-radius: 10px;
        outline: none;
        font-size: 1rem;
        background: none;
        transition: 0.3s;
      }

      .input-group label {
        position: absolute;
        top: 50%;
        left: 12px;
        transform: translateY(-50%);
        background: white;
        padding: 0 6px;
        color: #888;
        font-size: 0.85rem;
        pointer-events: none;
        transition: 0.3s;
      }

      .input-group input:focus,
      .input-group input:not(:placeholder-shown) {
        border-color: #007bff;
      }

      .input-group input:focus + label,
      .input-group input:not(:placeholder-shown) + label {
        top: -8px;
        font-size: 0.75rem;
        color: #007bff;
      }

      /* Button */
      button {
        width: 100%;
        padding: 14px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #0056b3;
      }

      /* Links */
      .links {
        margin-top: 12px;
        font-size: 0.85rem;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Login Admin</h1>
      <p style="text-align: right">تسجيل دخول أدمن</p>
      {% with messages = get_flashed_messages() %} {% if messages %}
      <div class="alert alert-danger alert-dismissible fade show" role="alert">
        <strong>Error!</strong> {{messages[0]}}
        <a
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
          aria-label="Close"
        ></a>
      </div>
      {% endif %} {% endwith %}
      <form id="signupForm" action="{{url_for('login')}}" method="POST">
        <div class="input-group">
          <input
            type="text"
            id="name"
            name="name"
            placeholder=" "
            required
            value="{{name}}"
          />
          <label for="name">Name</label>
        </div>

        <div class="input-group">
          <input
            type="number"
            id="number"
            placeholder=" "
            required
            value="{{number}}"
            name="number"
          />
          <label for="email">Phone Number</label>
        </div>

        <!-- Password Field -->
        <div class="input-group" style="position: relative">
          <input
            value="{{password}}"
            type="password"
            id="password"
            placeholder=" "
            required
            name="password"
          />
          <label for="password">Password</label>
          <span
            class="toggle-password"
            data-target="password"
            style="
              position: absolute;
              right: 12px;
              top: 50%;
              transform: translateY(-50%);
              cursor: pointer;
              color: #888;
              font-size: 0.9rem;
              user-select: none;
            "
            >Show</span
          >
        </div>
        <button type="submit stext-101">Login</button>
      </form>

      <div class="links">
        <a href="{{url_for('home')}}">Back to Home Page</a>
      </div>
    </div>
  </body>
</html>
